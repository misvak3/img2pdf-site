<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <title>IMG → PDF Çevirici</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <h1>Şəkilləri PDF-ə çevir</h1>
    <div id="drop-zone">
      <p>Şəkilləri bura sürüşdür və ya seç</p>
      <input type="file" id="file-input" multiple accept="image/*">
    </div>
    <div id="preview"></div>
    <button id="convert-btn" disabled>PDF yarat</button>
    <div id="status"></div>
  </main>
  <script src="script.js"></script>
</body>
</html>
